<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira Studies</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-container" class="container">
        <h1>Sexta-Feira Studies</h1>
        <div id="login-form">
            <h2>Entrar</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button id="login-btn">Entrar</button>
            <button id="google-login-btn">Entrar com Google</button>
            <p>Não tem conta? <a href="#" id="show-register">Cadastre-se</a></p>
        </div>
        <div id="register-form" style="display: none;">
            <h2>Cadastrar</h2>
            <input type="text" id="name" placeholder="Nome" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Senha" required>
            <input type="text" id="class" placeholder="Sala (ex: 9A)" required>
            <button id="register-btn">Cadastrar</button>
            <p>Já tem conta? <a href="#" id="show-login">Entrar</a></p>
        </div>
    </div>
    <div id="app-container" class="container" style="display: none;">
        <nav>
            <button class="nav-btn" data-screen="home">🏠 Home</button>
            <button class="nav-btn" data-screen="subjects">📚 Matérias</button>
            <button class="nav-btn" data-screen="ranking">🏆 Ranking</button>
            <button class="nav-btn" data-screen="history">📜 Histórico</button>
            <button id="logout-btn">Sair</button>
        </nav>
        <div id="home-screen" class="screen">
            <h1>Bem-vindo, <span id="user-name"></span> da sala <span id="user-class"></span>!</h1>
            <p>Explore suas matérias e quizzes.</p>
        </div>
        <div id="subjects-screen" class="screen" style="display: none;">
            <h1>Matérias</h1>
            <button id="create-subject-btn">Criar Matéria</button>
            <div id="subjects-list"></div>
        </div>
        <div id="subject-screen" class="screen" style="display: none;">
            <button id="back-to-subjects-btn">Voltar</button>
            <h2 id="subject-title"></h2>
            <p id="subject-description"></p>
            <button id="create-quiz-btn">Criar Quiz</button>
            <div id="quizzes-list"></div>
        </div>
        <div id="quiz-create-screen" class="screen" style="display: none;">
            <h1>Criar Quiz</h1>
            <input type="text" id="quiz-title" placeholder="Título do Quiz" required>
            <div id="questions-container">
                <div class="question">
                    <input type="text" placeholder="Enunciado" class="question-text" required>
                    <input type="text" placeholder="Alternativa A" class="alt-a" required>
                    <input type="text" placeholder="Alternativa B" class="alt-b" required>
                    <input type="text" placeholder="Alternativa C" class="alt-c" required>
                    <input type="text" placeholder="Alternativa D" class="alt-d" required>
                    <select class="correct-answer" required>
                        <option value="">Correta</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
            </div>
            <button id="add-question-btn">Adicionar Pergunta</button>
            <button id="save-quiz-btn">Salvar Quiz</button>
            <button id="back-to-subject-btn">Voltar</button>
        </div>
        <div id="quiz-play-screen" class="screen" style="display: none;">
            <h1 id="quiz-play-title"></h1>
            <div class="progress-bar"><div class="progress" id="progress"></div></div>
            <div id="question-display">
                <p id="question-text"></p>
                <button class="answer-btn" data-answer="A"></button>
                <button class="answer-btn" data-answer="B"></button>
                <button class="answer-btn" data-answer="C"></button>
                <button class="answer-btn" data-answer="D"></button>
            </div>
            <button id="next-question-btn" style="display: none;">Próximo</button>
            <div id="quiz-result" style="display: none;">
                <h2>Resultado</h2>
                <p>Pontuação: <span id="score"></span></p>
                <button id="back-to-subject-from-quiz">Voltar</button>
            </div>
        </div>
        <div id="ranking-screen" class="screen" style="display: none;">
            <h1>Ranking Global</h1>
            <div id="ranking-list"></div>
        </div>
        <div id="history-screen" class="screen" style="display: none;">
            <h1>Histórico</h1>
            <div id="history-list"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
