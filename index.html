<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira Studies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sexta-Feira Studies</h1>
        <div id="user-info">
            <span id="loggedInUser"></span>
            <button id="logout-btn" class="hidden">Logout</button>
        </div>
    </header>

    <main id="app-container">
        <section id="auth-section" class="active">
            <h2>Bem-vindo!</h2>
            <div class="auth-form">
                <h3>Login</h3>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Senha">
                <button id="login-btn">Entrar</button>
            </div>
            <div class="auth-form">
                <h3>Cadastro</h3>
                <input type="text" id="signup-name" placeholder="Nome">
                <input type="email" id="signup-email" placeholder="Email">
                <input type="password" id="signup-password" placeholder="Senha">
                <input type="text" id="signup-class" placeholder="Sala (ex: 9A)">
                <button id="signup-btn">Criar Conta</button>
            </div>
        </section>

        <section id="dashboard-section" class="hidden">
            <div class="dashboard-header">
                <div id="user-profile">
                    <p><strong>Nome:</strong> <span id="profile-name"></span></p>
                    <p><strong>Sala:</strong> <span id="profile-class"></span></p>
                    <p><strong>Pontos:</strong> <span id="profile-points"></span></p>
                </div>
                <div class="quick-actions">
                    <button id="create-subject-btn">Criar Matéria</button>
                    <button id="view-ranking-btn">Ver Ranking</button>
                    <button id="view-history-btn">Ver Histórico</button>
                </div>
            </div>

            <div id="subjects-container" class="content-area">
                <h2>Minhas Matérias</h2>
                <div id="subjects-list" class="card-container">
                    <!-- Matérias serão carregadas aqui -->
                </div>
            </div>

            <div id="subject-detail-section" class="content-area hidden">
                <h2 id="current-subject-title"></h2>
                <p id="current-subject-description"></p>
                <button id="back-to-dashboard-btn">Voltar para Matérias</button>
                <button id="create-topic-btn">Adicionar Tópico</button>
                <button id="create-quiz-btn">Criar Quiz</button>

                <div id="topics-container">
                    <h3>Tópicos</h3>
                    <ul id="topics-list">
                        <!-- Tópicos serão carregados aqui -->
                    </ul>
                </div>

                <div id="quizzes-container">
                    <h3>Quizzes Disponíveis</h3>
                    <ul id="quizzes-list">
                        <!-- Quizzes serão carregados aqui -->
                    </ul>
                </div>

                <div id="quiz-play-container" class="hidden">
                    <h3 id="quiz-title"></h3>
                    <div id="question-container">
                        <p id="question-text"></p>
                        <div id="options-container">
                            <!-- Opções do quiz serão carregadas aqui -->
                        </div>
                        <button id="next-question-btn">Próximo</button>
                    </div>
                    <div id="quiz-results" class="hidden">
                        <h4>Resultado do Quiz</h4>
                        <p>Sua pontuação: <span id="final-score"></span></p>
                        <p>Acertos: <span id="correct-answers"></span></p>
                        <button id="play-again-btn">Jogar Novamente</button>
                    </div>
                </div>
            </div>

            <div id="ranking-section" class="content-area hidden">
                <h2>Ranking Global</h2>
                <button id="back-to-dashboard-from-ranking-btn">Voltar</button>
                <ol id="ranking-list">
                    <!-- Ranking será carregado aqui -->
                </ol>
            </div>

            <div id="history-section" class="content-area hidden">
                <h2>Histórico de Quizzes</h2>
                <button id="back-to-dashboard-from-history-btn">Voltar</button>
                <ul id="history-list">
                    <!-- Histórico será carregado aqui -->
                </ul>
            </div>
        </section>
    </main>

    <div id="modal-overlay" class="hidden"></div>
    <div id="modal" class="hidden">
        <div id="modal-content">
            <span id="close-modal-btn">&times;</span>
            <h3 id="modal-title"></h3>
            <div id="modal-body">
                <!-- Conteúdo dinâmico do modal -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
