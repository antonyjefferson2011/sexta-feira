<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira Studies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <h1>📚 Sexta-Feira Studies</h1>
            <p>Plataforma de Aprendizado</p>

            <form id="login-form" class="auth-form active">
                <h2>Login</h2>
                <input type="text" id="login-name" placeholder="Nome de usuário" required>
                <input type="password" id="login-password" placeholder="Senha" required>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary">Entrar</button>
                <p>Não tem conta? <a href="#" id="toggle-signup-link">Criar</a></p>
            </form>

            <form id="signup-form" class="auth-form">
                <h2>Cadastro</h2>
                <input type="text" id="signup-name" placeholder="Nome de usuário" required>
                <input type="password" id="signup-password" placeholder="Senha" required>
                <input type="password" id="signup-password-confirm" placeholder="Confirmar senha" required>
                <input type="text" id="signup-class" placeholder="Série/Sala" required>
                <div id="signup-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary">Criar Conta</button>
                <p>Já tem conta? <a href="#" id="toggle-login-link">Login</a></p>
            </form>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen" class="app-screen" style="display: none;">
        <header class="app-header">
            <h1>📚 Sexta-Feira</h1>
            <div class="header-right">
                <span id="user-name"></span>
                <button id="btn-logout" class="btn btn-small">Sair</button>
            </div>
        </header>

        <main class="app-main">
            <!-- HOME -->
            <section id="screen-home" class="screen active">
                <div class="welcome">
                    <h2>Bem-vindo, <span id="welcome-name"></span>!</h2>
                    <p>Pontos: <strong id="welcome-points">0</strong></p>
                </div>

                <div class="quick-menu">
                    <button class="quick-btn" data-screen="subjects">📚 Matérias</button>
                    <button class="quick-btn" data-screen="ranking">🏆 Ranking</button>
                    <button class="quick-btn" data-screen="discover">🔍 Descobrir</button>
                    <button class="quick-btn" data-screen="profile">👤 Perfil</button>
                </div>
            </section>

            <!-- MATÉRIAS -->
            <section id="screen-subjects" class="screen">
                <h2>📚 Matérias</h2>
                <button class="btn btn-primary" onclick="openCreateSubject()">+ Nova Matéria</button>

                <div id="create-subject-form" style="display: none; margin: 20px 0; padding: 20px; background: #f0f0f0; border-radius: 8px;">
                    <input type="text" id="subject-title" placeholder="Nome da matéria" required>
                    <textarea id="subject-desc" placeholder="Descrição" style="width: 100%; margin-top: 10px; padding: 10px;"></textarea>
                    <button class="btn btn-primary" onclick="createSubject()" style="margin-top: 10px;">Criar</button>
                    <button class="btn btn-secondary" onclick="closeCreateSubject()" style="margin-top: 10px;">Cancelar</button>
                </div>

                <div id="subjects-list" class="list"></div>
            </section>

            <!-- RANKING -->
            <section id="screen-ranking" class="screen">
                <h2>🏆 Ranking</h2>
                <div id="ranking-list" class="list"></div>
            </section>

            <!-- DESCOBRIR -->
            <section id="screen-discover" class="screen">
                <h2>🔍 Descobrir</h2>
                <input type="text" id="discover-search" placeholder="Pesquisar..." style="width: 100%; padding: 10px; margin-bottom: 20px;">
                <div id="discover-list" class="list"></div>
            </section>

            <!-- PERFIL -->
            <section id="screen-profile" class="screen">
                <h2>👤 Meu Perfil</h2>
                <div class="profile-info">
                    <p>Nome: <strong id="profile-name"></strong></p>
                    <p>Sala: <strong id="profile-class"></strong></p>
                    <p>Pontos: <strong id="profile-points"></strong></p>
                </div>
                <button class="btn btn-primary" onclick="openEditProfile()">Editar Sala</button>
                <button class="btn btn-primary" onclick="openChangePassword()">Alterar Senha</button>
                <button class="btn btn-danger" onclick="openAdmPanel()">Painel ADM</button>
            </section>

            <!-- ADM -->
            <section id="screen-adm" class="screen">
                <h2>⚙️ Painel ADM</h2>
                <div id="adm-login" style="display: none;">
                    <input type="password" id="adm-password" placeholder="Senha do ADM">
                    <button class="btn btn-primary" onclick="admLogin()">Entrar</button>
                </div>
                <div id="adm-panel" style="display: none;">
                    <h3>Depositar Pontos</h3>
                    <input type="number" id="adm-points" placeholder="Quantidade" min="1">
                    <button class="btn btn-primary" onclick="depositPoints()">Depositar</button>

                    <h3 style="margin-top: 20px;">Criar Quiz</h3>
                    <select id="adm-subject" style="width: 100%; padding: 10px; margin-bottom: 10px;"></select>
                    <textarea id="adm-code" placeholder="/n Nome do Quiz&#10;/q1 Pergunta&#10;/a1 Opção 1&#10;/a2 Opção 2&#10;/a3 Opção 3&#10;/a4 Opção 4&#10;/c 1" style="width: 100%; height: 150px; padding: 10px; margin-bottom: 10px;"></textarea>
                    <button class="btn btn-primary" onclick="createQuizFromCode()">Criar Quiz</button>

                    <button class="btn btn-danger" onclick="admLogout()" style="margin-top: 20px;">Sair do ADM</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="home">🏠 Home</button>
            <button class="nav-item" data-screen="subjects">📚 Matérias</button>
            <button class="nav-item" data-screen="ranking">🏆 Ranking</button>
            <button class="nav-item" data-screen="discover">🔍 Descobrir</button>
            <button class="nav-item" data-screen="profile">👤 Perfil</button>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
