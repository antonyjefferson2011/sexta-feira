<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira Studies</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBAs3irtV6MuTPHmsxYwYSFMTkX6_6ntz8",
            authDomain: "sexta-feira-fb01a.firebaseapp.com",
            projectId: "sexta-feira-fb01a",
            storageBucket: "sexta-feira-fb01a.appspot.com",
            messagingSenderId: "82809140147",
            appId: "1:82809140147:web:2a3f3ece3e81c33b0b91c6"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <div id="app" class="hidden">
        <div id="home" class="screen">
            <h1>Bem-vindo, <span id="userName"></span>!</h1>
            <p>Sala: <span id="userClass"></span></p>
            <button onclick="navigateTo('subjects')">Ir para Matérias</button>
        </div>
        <div id="subjects" class="screen hidden">
            <h2>Matérias</h2>
            <input type="text" id="subjectTitle" placeholder="Nome da Matéria">
            <input type="text" id="subjectDescription" placeholder="Descrição">
            <button onclick="createSubject()">Criar Matéria</button>
            <div id="subjectList"></div>
        </div>
        <div id="quizzes" class="screen hidden">
            <h2>Quiz</h2>
            <input type="text" id="quizTitle" placeholder="Título do Quiz">
            <div id="questions"></div>
            <button onclick="createQuiz()">Criar Quiz</button>
        </div>
        <div id="ranking" class="screen hidden">
            <h2>Ranking Global</h2>
            <div id="rankingList"></div>
        </div>
        <div id="history" class="screen hidden">
            <h2>Histórico</h2>
            <div id="historyList"></div>
        </div>
        <button onclick="logout()">Sair</button>
    </div>
    <div id="login" class="screen">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <input type="text" id="name" placeholder="Nome">
        <input type="text" id="class" placeholder="Sala">
        <button onclick="register()">Cadastrar</button>
        <button onclick="login()">Entrar</button>
        <button onclick="loginWithGoogle()">Entrar com Google</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
